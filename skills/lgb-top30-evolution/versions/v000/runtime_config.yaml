model:
  type: lightgbm
  rolling:
    enabled: true
    start_date: 2024-08
    end_date: 2025-08
    train_months: 48
    valid_ratio: 0.15
    purge_days: 11
    max_workers: 3
    worker_threads: 8
    score_ema:
      enabled: false
      span: 3
  lgb_params: {}
  temporal_subsample:
    enabled: true
    step_days: 3
    apply_to: train
  sample_weight:
    enabled: true
    halflife_days: 540
  refit_on_all: true
score_neutralization:
  enabled: false
  mode: always
  r2_threshold: 0.2
risk_control:
  enabled: true
  blacklist: []
  filters:
    filter_st: true
    filter_limit: true
  market_regime_position:
    enabled: false
    mode: state_machine
    bearish_return_threshold: -0.05
    weak_breadth_threshold: 0.45
    bullish_return_threshold: 0.05
    strong_breadth_threshold: 0.55
    warning_position: 0.85
    reduced_position: 0.7
    missing_data_position: 0.7
    early_bearish_return_threshold: -0.03
    early_weak_breadth_threshold: 0.47
    early_bearish_ret_delta_threshold: -0.02
    early_bearish_breadth_delta_threshold: -0.03
    early_bullish_return_threshold: 1.0
    early_strong_breadth_threshold: 1.0
    early_overheated_delta_threshold: 1.0
    recovery_window: 1
backtest:
  enabled: true
  account: 1000000
  scoring_mode: runtime
  fundamental_filter:
    enabled: true
    revenue_threshold: 100000000
    filter_negative_net_assets: true
  exposure_constraints:
    enabled: false
    missing_policy: warn
    groups:
      concept:
        enabled: false
        source: data/reference/Table.xls
        source_format: ths_concept_table
        default_start_date: '2026-01-01'
        max_weight: 0.6
        require_effective_dates_for_backtest: false
        exclude_names:
        - 融资融券
        - 沪股通
        - 深股通
        - ST板块
        - 同花顺出海50
        - 同花顺新质50
        - 同花顺漂亮100
        - 同花顺果指数
        - 中国AI 50
        - 回购增持再贷款概念
        - 股权转让(并购重组)
        - 一带一路
        - 专精特新
        exclude_patterns:
        - ^\d{4}.*预增$
  mvo_optimizer:
    solver: CLARABEL
    risk_aversion: 0.4
    turnover_penalty: 0.01
    universe_multiplier: 3
    score_to_return_scale: auto
    score_horizon_days: 10
    max_weight: 0.08
    max_industry_weight: 0.25
    cov_lookback: 250
    cov_shrinkage: true
    market_cap_constraint:
      enabled: false
      threshold: 0.9
      fields:
      - $circ_mv
      - $total_mv
      lookback_days: 30
      min_valid_ratio: 0.5
  start_date: '2021-01-01'
  end_date: '2026-05-30'
  strategy:
    type: TopkDropout
    topk: 30
    n_drop: 30
    rebalance_freq: 10d
    weight_method: mvo
  costs:
    commission_rate: 0.0002
    slippage: 0.001
    stamp_tax: 0.0005
  benchmark: SH000985
